    <h2 class="pages">ハンドスピナーとは</h2>
    <p>ハンドスピナーは、手で持って回すことができる小型の玩具です。中心にベアリングがあり、指でつまんで回すことで、長時間回転し続けることができます。ストレス解消や集中力向上のために使用されることがあります。</p>
